      - name: دانلود و پردازش (سرعت بالا)
        run: |
          DELIMITER="${{ github.event.inputs.delimiter }}"
          IFS="$DELIMITER" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          clean_urls=()
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && clean_urls+=("$url")
          done
          
          total_urls=${#clean_urls[@]}
          echo "📊 تعداد لینک: $total_urls"
          
          success=0
          fail=0
          total_bytes=0
          
          echo "🚀 شروع دانلود موازی $total_urls فایل..."
          
          # فعال کردن job control
          set -m
          
          for i in "${!clean_urls[@]}"; do
            url="${clean_urls[$i]}"
            current=$((i + 1))
            
            RAW_FILENAME=$(echo "$url" | grep -oP '[^/]+\.(mp4|mkv|avi|mov|webm|flv|mp3|m4a|jpg|png|gif|pdf|zip|rar|7z)(\?.*)?$' | cut -d '?' -f1)
            
            if [ -z "$RAW_FILENAME" ]; then
              RAW_FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            fi
            
            FILENAME=$(echo "$RAW_FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ] || [ ${#FILENAME} -gt 80 ]; then
              FILENAME=$(printf "file_%02d" $current)
            fi
            
            echo "📥 [$current/$total_urls] $FILENAME"
            
            # دانلود در پس‌زمینه
            (
              curl -L --fail --retry 3 --retry-delay 3 \
                   --connect-timeout 20 --max-time 600 \
                   -o "${{ env.MAIN_FOLDER }}/${FILENAME}" \
                   "$url" 2>/dev/null
            ) &
          done
          
          # صبر برای همه پروسه‌های پس‌زمینه (بدون timeout)
          echo "⏳ منتظر اتمام دانلودها..."
          wait
          echo "✅ همه دانلودها تموم شد!"
          
          # ====== مرحله ۲: بررسی و فشرده‌سازی ======
          cd "${{ env.MAIN_FOLDER }}"
          
          # ببینیم چی دانلود شده
          echo "📂 محتویات پوشه:"
          ls -lh
          
          # لیست فایل‌های دانلود شده
          downloaded_files=($(ls -1))
          
          file_index=0
          for FILENAME in "${downloaded_files[@]}"; do
            file_index=$((file_index + 1))
            
            FILE_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || echo 0)
            
            if [ "$FILE_SIZE" = "0" ]; then
              echo "❌ $FILENAME حجم صفر - رد شد"
              rm -f "$FILENAME"
              fail=$((fail + 1))
              continue
            fi
            
            echo "✅ $FILENAME ($(numfmt --to=iec $FILE_SIZE))"
            total_bytes=$((total_bytes + FILE_SIZE))
            
            MIME=$(file --mime-type -b "$FILENAME" 2>/dev/null)
            
            case "$MIME" in
              video/mp4)             EXT=".mp4" ;;
              video/x-matroska)      EXT=".mkv" ;;
              video/webm)            EXT=".webm" ;;
              video/x-msvideo)       EXT=".avi" ;;
              video/quicktime)       EXT=".mov" ;;
              audio/mpeg)            EXT=".mp3" ;;
              audio/mp4)             EXT=".m4a" ;;
              image/jpeg)            EXT=".jpg" ;;
              image/png)             EXT=".png" ;;
              application/pdf)       EXT=".pdf" ;;
              application/zip)       EXT=".zip" ;;
            esac
            
            if [ -n "$EXT" ] && [[ ! "$FILENAME" =~ \.[a-zA-Z0-9]+$ ]]; then
              mv "$FILENAME" "${FILENAME}${EXT}"
              FILENAME="${FILENAME}${EXT}"
            fi
            
            ARCHIVE_NAME=$(printf "file_%02d" $file_index)
            
            if 7z a -p"${{ github.event.inputs.zip_password }}" -mhe=on -mx=0 -v95m \
                 "${ARCHIVE_NAME}.7z" "$FILENAME" > /dev/null 2>&1; then
              echo "  🗜️ ${ARCHIVE_NAME}.7z.xxx (حاوی: $FILENAME)"
              rm -f "$FILENAME"
              success=$((success + 1))
            else
              echo "  ❌ خطای فشرده‌سازی"
              fail=$((fail + 1))
            fi
          done
          
          cd - > /dev/null
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 نهایی: کل=$total_urls | ✅$success | ❌$fail"
          echo "📊 مجموع حجم: $(numfmt --to=iec $total_bytes)"
          echo "═════════════════════════════════════════════"
