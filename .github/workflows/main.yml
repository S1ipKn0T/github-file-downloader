name: دانلود و آپلود مستقیم به گوگل درایو (بدون فشرده‌سازی)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: read

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl
          curl https://rclone.org/install.sh | sudo bash

      - name: تنظیم کانفیگ Rclone
        run: |
          mkdir -p ~/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: ایجاد پوشه موقت
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه مقصد در گوگل درایو: $MAIN_FOLDER"

      - name: دانلود و آپلود مستقیم
        run: |
          IFS="${{ github.event.inputs.delimiter }}" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          success=0
          fail=0
          file_index=0
          
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            file_index=$((file_index + 1))
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$file_index] پردازش..."
            
            # استخراج نام فایل از URL
            FILENAME=$(basename "$url" | cut -d '?' -f1)
            # اگر نام فایل معنی‌دار نبود، یک نام پیش‌فرض بگذار
            if [ -z "$FILENAME" ] || [ ${#FILENAME} -lt 3 ]; then
              FILENAME="file_$(printf '%02d' $file_index)"
            fi
            # جایگزینی کاراکترهای غیرمجاز
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "📄 نام فایل: $FILENAME"
            
            # دانلود فایل
            echo "⬇️ دانلود..."
            if curl -L --fail --retry 3 --retry-delay 3 \
                 --connect-timeout 20 --max-time 600 \
                 -o "${{ env.MAIN_FOLDER }}/$FILENAME" \
                 "$url" 2>/dev/null; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/$FILENAME")
              echo "✅ دانلود موفق: $(numfmt --to=iec $FILE_SIZE)"
              
              # آپلود مستقیم به گوگل درایو
              echo "🚀 آپلود به گوگل درایو..."
              rclone copy "${{ env.MAIN_FOLDER }}/$FILENAME" \
                "gdrive:/${{ env.MAIN_FOLDER }}/" \
                --progress \
                --verbose
              
              if [ $? -eq 0 ]; then
                echo "✅ $FILENAME با موفقیت آپلود شد!"
                rm -f "${{ env.MAIN_FOLDER }}/$FILENAME"
                success=$((success + 1))
              else
                echo "❌ خطا در آپلود $FILENAME"
                fail=$((fail + 1))
              fi
            else
              echo "❌ دانلود ناموفق"
              fail=$((fail + 1))
            fi
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 آمار نهایی"
          echo "   کل لینک‌ها: $file_index"
          echo "   ✅ موفق: $success"
          echo "   ❌ ناموفق: $fail"
          
          if [ "$success" -eq 0 ]; then
            echo "❌ هیچ فایلی با موفقیت آپلود نشد!"
            exit 1
          fi
          
          echo "🎉 تمام فایل‌ها با موفقیت به گوگل درایو منتقل شدند!"
