name: دانلود و آپلود به گوگل درایو

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با ; جدا بشن'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: read

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl
          curl https://rclone.org/install.sh | sudo bash

      - name: تنظیم کانفیگ Rclone
        run: |
          mkdir -p ~/.config/rclone/
          # فقط یک فایل rclone.conf می‌سازیم که همه ریموت‌ها توش باشه
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf
          echo "✅ کانفیگ Rclone تنظیم شد."

      - name: ایجاد پوشه موقت
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه مقصد: $MAIN_FOLDER"

      - name: استخراج، دانلود و آپلود
        run: |
          IFS="${{ github.event.inputs.delimiter }}" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          success=0
          fail=0
          file_index=0
          
          # تابع آپلود با تلاش به ترتیب ۱ تا ۴
          upload_sequential() {
            local FILE_TO_UPLOAD=$1
            
            # از ۱ شروع می‌کنه و به ترتیب می‌ره تا ۴
            for CURRENT_DRIVE in 1 2 3 4; do
              echo "🔍 تلاش برای آپلود روی اکانت شماره $CURRENT_DRIVE..."
              
              if rclone copy "${{ env.MAIN_FOLDER }}/$FILE_TO_UPLOAD" \
                "gdrive${CURRENT_DRIVE}:/${{ env.MAIN_FOLDER }}/" \
                --progress \
                --transfers 4 \
                --buffer-size 64M 2>&1; then
                
                echo "✅ $FILE_TO_UPLOAD با موفقیت در اکانت $CURRENT_DRIVE آپلود شد!"
                return 0
              else
                ERROR_CODE=$?
                echo "⚠️ اکانت $CURRENT_DRIVE در دسترس نیست یا پر است (کد خطا: $ERROR_CODE)"
                
                if [ $CURRENT_DRIVE -lt 4 ]; then
                  echo "🔄 تلاش روی اکانت بعدی..."
                fi
              fi
            done
            
            return 1
          }
          
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            file_index=$((file_index + 1))
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$file_index] پردازش..."
            
            # استخراج نام پوشه والد از URL
            FOLDER_NAME=$(echo "$url" | rev | cut -d'/' -f2 | rev)
            
            # استخراج نام فایل از URL
            FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            [ -z "$FILENAME" ] && FILENAME="file_$(printf '%02d' $file_index)"
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # ترکیب نام پوشه و نام فایل
            UNIQUE_FILENAME="${FOLDER_NAME}_${FILENAME}"
            
            echo "📄 نام فایل: $UNIQUE_FILENAME"
            
            # دانلود فایل
            echo "⬇️ دانلود..."
            if curl -L --fail --retry 2 --retry-delay 2 \
                 --connect-timeout 10 --max-time 300 \
                 -o "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME" \
                 "$url" 2>/dev/null; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME")
              echo "✅ دانلود موفق: $(numfmt --to=iec $FILE_SIZE)"
              
              # آپلود با اولویت ۱ تا ۴
              echo "🚀 شروع آپلود (اولویت: gdrive1 → gdrive2 → gdrive3 → gdrive4)..."
              if upload_sequential "$UNIQUE_FILENAME"; then
                rm -f "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME"
                success=$((success + 1))
              else
                echo "❌ آپلود $UNIQUE_FILENAME روی هیچکدوم از ۴ اکانت موفق نبود"
                fail=$((fail + 1))
              fi
            else
              echo "❌ دانلود ناموفق"
              fail=$((fail + 1))
            fi
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 آمار نهایی"
          echo "   کل لینک‌ها: $file_index"
          echo "   ✅ موفق: $success"
          echo "   ❌ ناموفق: $fail"
          
          if [ "$success" -eq 0 ]; then
            echo "❌ هیچ فایلی با موفقیت آپلود نشد!"
            exit 1
          fi
          
          echo "🎉 تمام فایل‌ها با موفقیت به گوگل درایوها منتقل شدند!"
