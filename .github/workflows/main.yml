name: دانلود و آپلود مطمئن به گوگل درایو (۴ اکانته با Fallback)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: read

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl
          curl https://rclone.org/install.sh | sudo bash

      - name: تنظیم کانفیگ‌های Rclone برای ۴ اکانت
        run: |
          mkdir -p ~/.config/rclone/
          
          # تنظیم اکانت اول
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone1.conf
          
          # تنظیم اکانت دوم
          echo "${{ secrets.RCLONE_CONFIG_BASE64_2 }}" | base64 -d > ~/.config/rclone/rclone2.conf
          
          # تنظیم اکانت سوم
          echo "${{ secrets.RCLONE_CONFIG_BASE64_3 }}" | base64 -d > ~/.config/rclone/rclone3.conf
          
          # تنظیم اکانت چهارم
          echo "${{ secrets.RCLONE_CONFIG_BASE64_4 }}" | base64 -d > ~/.config/rclone/rclone4.conf
          
          echo "✅ کانفیگ‌های Rclone برای ۴ اکانت تنظیم شد."

      - name: ایجاد پوشه موقت
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه مقصد: $MAIN_FOLDER"

      - name: استخراج، دانلود و آپلود
        run: |
          IFS="${{ github.event.inputs.delimiter }}" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          success=0
          fail=0
          file_index=0
          drive_counter=0  # شمارنده برای چرخش بین ۴ گوگل درایو
          
          # تابع کمکی برای آپلود با قابلیت تلاش روی اکانت‌های مختلف
          upload_with_fallback() {
            local FILE_TO_UPLOAD=$1
            local START_DRIVE=$2
            
            # تلاش روی همه ۴ اکانت، از اکانت START_DRIVE شروع می‌کنه
            for i in $(seq 0 3); do
              local CURRENT_DRIVE=$(( (START_DRIVE - 1 + i) % 4 + 1 ))
              
              echo "🔍 تلاش برای آپلود روی اکانت شماره $CURRENT_DRIVE..."
              
              if rclone copy "${{ env.MAIN_FOLDER }}/$FILE_TO_UPLOAD" \
                "gdrive${CURRENT_DRIVE}:/${{ env.MAIN_FOLDER }}/" \
                --config="$HOME/.config/rclone/rclone${CURRENT_DRIVE}.conf" \
                --progress \
                --transfers 4 \
                --buffer-size 64M 2>&1; then
                
                echo "✅ $FILE_TO_UPLOAD با موفقیت در اکانت $CURRENT_DRIVE آپلود شد!"
                return 0  # موفقیت
              else
                ERROR_CODE=$?
                echo "⚠️ خطا در آپلود به اکانت $CURRENT_DRIVE (کد خطا: $ERROR_CODE)"
                
                # اگر ارور از نوع Quota باشه، پیام مناسب می‌دیم و ادامه می‌دیم
                # اگر ارور دیگه‌ای باشه (مثل قطعی شبکه)، شاید بهتر باشه باز هم continue نکنیم
                if [ $CURRENT_DRIVE -ne $(( (START_DRIVE - 1 + 3) % 4 + 1 )) ]; then
                  echo "🔄 تلاش روی اکانت بعدی..."
                fi
              fi
            done
            
            # اگر به اینجا برسیم یعنی هیچکدوم از ۴ اکانت جواب ندادن
            return 1  # شکست
          }
          
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            file_index=$((file_index + 1))
            
            # انتخاب گوگل درایو به صورت چرخشی (1 تا 4)
            drive_counter=$(( (drive_counter % 4) + 1 ))
            START_DRIVE=$drive_counter
            
            echo ""
            echo "═════════════════════════════════════════════"
            echo "📥 [$file_index] پردازش (اکانت پیش‌فرض: $START_DRIVE)..."
            
            # استخراج نام پوشه والد از URL برای یکتاسازی نام فایل
            FOLDER_NAME=$(echo "$url" | rev | cut -d'/' -f2 | rev)
            
            # استخراج نام فایل از URL
            FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            [ -z "$FILENAME" ] && FILENAME="file_$(printf '%02d' $file_index)"
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            # ترکیب نام پوشه و نام فایل برای ساختن یک نام یکتا
            UNIQUE_FILENAME="${FOLDER_NAME}_${FILENAME}"
            
            echo "📄 نام فایل: $UNIQUE_FILENAME"
            
            # دانلود فایل
            echo "⬇️ دانلود..."
            if curl -L --fail --retry 2 --retry-delay 2 \
                 --connect-timeout 10 --max-time 300 \
                 -o "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME" \
                 "$url" 2>/dev/null; then
              
              FILE_SIZE=$(stat -c%s "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME")
              echo "✅ دانلود موفق: $(numfmt --to=iec $FILE_SIZE)"
              
              # آپلود با قابلیت Fallback
              echo "🚀 شروع پروسه آپلود (با قابلیت انتخاب خودکار اکانت جایگزین)..."
              if upload_with_fallback "$UNIQUE_FILENAME" $START_DRIVE; then
                rm -f "${{ env.MAIN_FOLDER }}/$UNIQUE_FILENAME"
                success=$((success + 1))
              else
                echo "❌ آپلود $UNIQUE_FILENAME روی هیچکدوم از ۴ اکانت موفق نبود"
                fail=$((fail + 1))
              fi
            else
              echo "❌ دانلود ناموفق"
              fail=$((fail + 1))
            fi
          done
          
          echo ""
          echo "═════════════════════════════════════════════"
          echo "📊 آمار نهایی"
          echo "   کل لینک‌ها: $file_index"
          echo "   ✅ موفق: $success"
          echo "   ❌ ناموفق: $fail"
          
          if [ "$success" -eq 0 ]; then
            echo "❌ هیچ فایلی با موفقیت آپلود نشد!"
            exit 1
          fi
          
          echo "🎉 تمام فایل‌ها با موفقیت به گوگل درایوها منتقل شدند!"
