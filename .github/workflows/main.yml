name: دانلود و آپلود موازی به گوگل درایو (بدون فشرده‌سازی)

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'لینک‌ها با جداکننده ;'
        required: true
        type: string
      custom_folder:
        description: 'نام پوشه (اختیاری)'
        required: false
        type: string
        default: ''
      delimiter:
        description: 'جداکننده (پیش‌فرض: ;)'
        required: false
        type: string
        default: ';'

permissions:
  contents: read

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq curl parallel
          curl https://rclone.org/install.sh | sudo bash

      - name: تنظیم کانفیگ Rclone
        run: |
          mkdir -p ~/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: ایجاد پوشه موقت
        run: |
          if [ -n "${{ github.event.inputs.custom_folder }}" ]; then
            MAIN_FOLDER="downloads/${{ github.event.inputs.custom_folder }}"
          else
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            MAIN_FOLDER="downloads/batch_${TIMESTAMP}_${{ github.run_number }}"
          fi
          mkdir -p "$MAIN_FOLDER"
          echo "MAIN_FOLDER=$MAIN_FOLDER" >> $GITHUB_ENV
          echo "📁 پوشه مقصد در گوگل درایو: $MAIN_FOLDER"

      - name: استخراج و نام‌گذاری یکتا
        run: |
          IFS="${{ github.event.inputs.delimiter }}" read -ra urls <<< "${{ github.event.inputs.file_urls }}"
          
          # حذف لینک‌های خالی و ساخت لیست
          > url_list.txt
          file_index=0
          for url in "${urls[@]}"; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            file_index=$((file_index + 1))
            
            # استخراج نام فایل از URL
            FILENAME=$(basename "$url" | cut -d '?' -f1 | python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))" 2>/dev/null || basename "$url" | cut -d '?' -f1)
            [ -z "$FILENAME" ] && FILENAME="file_$(printf '%02d' $file_index)"
            FILENAME=$(echo "$FILENAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "$url|$FILENAME" >> url_list.txt
          done
          
          # رفع نام‌های تکراری
          awk -F'|' '
          {
            name = $2
            if (count[name] > 0) {
              # جدا کردن نام و پسوند
              if (match(name, /\.[a-zA-Z0-9]+$/)) {
                base = substr(name, 1, RSTART-1)
                ext = substr(name, RSTART)
              } else {
                base = name
                ext = ""
              }
              $2 = base "-" count[name] ext
            }
            count[name]++
            print $1 "|" $2
          }' url_list.txt > url_list_final.txt
          
          echo "📊 تعداد لینک‌های معتبر: $(wc -l < url_list_final.txt)"
          cat url_list_final.txt

      - name: دانلود و آپلود همزمان
        run: |
          echo "🚀 شروع دانلود و آپلود موازی..."
          
          FIFO="/tmp/upload_fifo"
          mkfifo "$FIFO"
          
          # پراسس آپلود (در پس‌زمینه)
          (
            while IFS='|' read -r filepath filename; do
              [ -f "$filepath" ] || continue
              echo "📤 آپلود: $filename"
              rclone copy "$filepath" "gdrive:/${{ env.MAIN_FOLDER }}/" \
                --progress \
                --transfers 4 \
                --checkers 8 \
                --buffer-size 64M \
                --no-traverse
              if [ $? -eq 0 ]; then
                echo "✅ $filename"
                rm -f "$filepath"
              else
                echo "❌ $filename"
              fi
            done < "$FIFO"
          ) &
          UPLOAD_PID=$!
          
          # پراسس دانلود (اصلی)
          while IFS='|' read -r url filename; do
            filepath="${{ env.MAIN_FOLDER }}/$filename"
            echo "⬇️ $filename"
            if curl -L --fail --retry 2 --retry-delay 2 \
                 --connect-timeout 10 --max-time 300 \
                 -o "$filepath" \
                 "$url" 2>/dev/null; then
              echo "$filepath|$filename" > "$FIFO"
            else
              echo "❌ دانلود: $filename"
            fi
          done < url_list_final.txt
          
          # سیگنال پایان به آپلودر
          sleep 5
          kill $UPLOAD_PID 2>/dev/null
          rm -f "$FIFO"
          
          echo "🎉 عملیات به پایان رسید!"
