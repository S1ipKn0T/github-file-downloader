name: Spotify to Google Drive Sync

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:      # Manual trigger button

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install spotDL
        run: pip install spotdl
      
      - name: Download Spotify Playlist
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          spotdl download ${{ secrets.SPOTIFY_PLAYLIST_URL }} \
            --client-id $SPOTIFY_CLIENT_ID \
            --client-secret $SPOTIFY_CLIENT_SECRET \
            --output ./downloads \
            --audio piped
      
      - name: Setup Rclone
        env:
          RCLONE_CONFIG_BASE64_1: ${{ secrets.RCLONE_CONFIG_BASE64_1 }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG_BASE64_1" | base64 -d > ~/.config/rclone/rclone.conf
      
      - name: Upload to Google Drive
        run: |
          rclone copy ./downloads gdrive:Spotify-Music --progress --create-empty-src-dirs
      
      - name: Keep workflow artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: spotify-downloads
          path: ./downloads/
          retention-days: 7
