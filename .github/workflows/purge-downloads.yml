name: حذف کامل پوشه downloads و پاکسازی تاریخچه

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  purge-downloads:
    runs-on: ubuntu-latest
    steps:
      - name: حذف تمام فایل‌های پوشه downloads با API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 دریافت ساختار فایل‌ها..."
          
          MAIN_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/ref/heads/main" | jq -r '.object.sha')
          
          TREE_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/commits/$MAIN_SHA" | jq -r '.tree.sha')
          
          # دریافت لیست فایل‌ها
          TREE_CONTENT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/git/trees/$TREE_SHA?recursive=1")
          
          # فیلتر کردن فایل‌هایی که در downloads/ نیستند
          FILTERED_TREE=$(echo "$TREE_CONTENT" | jq '[ .tree[] | select(.path | startswith("downloads/") | not) ]')
          
          echo "تعداد فایل‌های باقی‌مانده: $(echo "$FILTERED_TREE" | jq 'length')"
          
          # ساختن tree جدید
          NEW_TREE_ITEMS=$(echo "$FILTERED_TREE" | jq '[.[] | {path: .path, mode: .mode, type: .type, sha: .sha}]')
          
          echo "🌱 ساخت tree جدید..."
          NEW_TREE_RESPONSE=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"tree\":$NEW_TREE_ITEMS}" \
            "https://api.github.com/repos/${{ github.repository }}/git/trees")
          
          NEW_TREE_SHA=$(echo "$NEW_TREE_RESPONSE" | jq -r '.sha')
          
          if [ "$NEW_TREE_SHA" = "null" ] || [ -z "$NEW_TREE_SHA" ]; then
            echo "❌ خطا: $NEW_TREE_RESPONSE"
            exit 1
          fi
          
          echo "✅ Tree جدید: $NEW_TREE_SHA"
          
          # ساختن commit با parent (نه یتیم)
          echo "📝 ساخت commit..."
          NEW_COMMIT_RESPONSE=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"message\":\"🗑️ حذف کامل پوشه downloads\",\"tree\":\"$NEW_TREE_SHA\",\"parents\":[\"$MAIN_SHA\"]}" \
            "https://api.github.com/repos/${{ github.repository }}/git/commits")
          
          NEW_COMMIT_SHA=$(echo "$NEW_COMMIT_RESPONSE" | jq -r '.sha')
          
          if [ "$NEW_COMMIT_SHA" = "null" ] || [ -z "$NEW_COMMIT_SHA" ]; then
            echo "❌ خطا: $NEW_COMMIT_RESPONSE"
            exit 1
          fi
          
          echo "✅ Commit: $NEW_COMMIT_SHA"
          
          # به‌روزرسانی شاخه main
          echo "🚀 به‌روزرسانی شاخه main..."
          curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"sha\":\"$NEW_COMMIT_SHA\",\"force\":false}" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/main"
          
          echo "🎉 پوشه downloads با موفقیت حذف شد!"
